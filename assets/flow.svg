<svg xmlns="http://www.w3.org/2000/svg" width="920" height="240" viewBox="0 0 920 240" fill="none">
  <style>
    .card { fill: #f6f8fa; stroke: #d0d7de; }
    .title { fill: #1f2328; font: 600 15px system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .sub { fill: #57606a; font: 400 11.5px system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .step { fill: #ffffff; font: 700 10px system-ui, -apple-system, 'Segoe UI', sans-serif; text-anchor: middle; }
    .arrow { stroke: #8c959f; stroke-width: 1.5; }
    .chev { fill: #8c959f; }
    .c1 { fill: #ddf4ff; } .g1 { stroke: #0969da; }
    .c2 { fill: #dafbe1; } .g2 { stroke: #1a7f37; }
    .c3 { fill: #fbefff; } .g3 { stroke: #8250df; }
    .c4 { fill: #fff1e5; } .g4 { stroke: #bc4c00; }
    .b1 { fill: #0969da; } .b2 { fill: #1a7f37; } .b3 { fill: #8250df; } .b4 { fill: #bc4c00; }
    .icon { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #30363d; }
      .title { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .step { fill: #0d1117; }
      .arrow { stroke: #6e7681; }
      .chev { fill: #6e7681; }
      .c1 { fill: #0c2d6b33; } .g1 { stroke: #4493f8; } .b1 { fill: #4493f8; }
      .c2 { fill: #0f53233f; } .g2 { stroke: #3fb950; } .b2 { fill: #3fb950; }
      .c3 { fill: #46227e3a; } .g3 { stroke: #a371f7; } .b3 { fill: #a371f7; }
      .c4 { fill: #5a2c0940; } .g4 { stroke: #d47616; } .b4 { fill: #d47616; }
    }
  </style>

  <!-- Card 1: comment -->
  <g>
    <rect class="card" x="20" y="62" width="185" height="118" rx="10"/>
    <circle class="c1" cx="52" cy="94" r="17"/>
    <path class="icon g1" d="M44 88 h16 a2.5 2.5 0 0 1 2.5 2.5 v8 a2.5 2.5 0 0 1 -2.5 2.5 h-9 l-4.5 4 v-4 a2.5 2.5 0 0 1 -2.5 -2.5 v-8 a2.5 2.5 0 0 1 2.5 -2.5 z"/>
    <circle class="b1" cx="176" cy="76" r="8"/>
    <text class="step" x="176" y="79.5">1</text>
    <text class="title" x="36" y="132">Comment</text>
    <text class="sub" x="36" y="150">Gutter + or Ctrl+Alt+C</text>
    <text class="sub" x="36" y="164">on any line or selection</text>
  </g>

  <line class="arrow" x1="212" y1="121" x2="228" y2="121"/>
  <path class="chev" d="M228 116 l7 5 -7 5 z"/>

  <!-- Card 2: staged file -->
  <g>
    <rect class="card" x="245" y="62" width="185" height="118" rx="10"/>
    <circle class="c2" cx="277" cy="94" r="17"/>
    <path class="icon g2" d="M270 86 h10 l6 6 v12 a2 2 0 0 1 -2 2 h-14 a2 2 0 0 1 -2 -2 v-16 a2 2 0 0 1 2 -2 z M280 86 v6 h6 M272 96 h12 M272 100 h12"/>
    <circle class="b2" cx="401" cy="76" r="8"/>
    <text class="step" x="401" y="79.5">2</text>
    <text class="title" x="261" y="132">Staged reviews</text>
    <text class="sub" x="261" y="150">mirrored live to</text>
    <text class="sub" x="261" y="164">.codex/pending-reviews.md</text>
  </g>

  <line class="arrow" x1="437" y1="121" x2="453" y2="121"/>
  <path class="chev" d="M453 116 l7 5 -7 5 z"/>

  <!-- Card 3: chip in composer -->
  <g>
    <rect class="card" x="470" y="62" width="185" height="118" rx="10"/>
    <circle class="c3" cx="502" cy="94" r="17"/>
    <path class="icon g3" d="M494 90 l8.5 -2 a3 3 0 0 1 3.5 3.5 l-2 8.5 a2 2 0 0 1 -1 1.2 l-7.8 3.6 a2 2 0 0 1 -2.6 -2.6 l3.6 -7.8 a2 2 0 0 1 1.2 -1 z M496 100 l6 -6"/>
    <circle class="b3" cx="626" cy="76" r="8"/>
    <text class="step" x="626" y="79.5">3</text>
    <text class="title" x="486" y="132">One chip attached</text>
    <text class="sub" x="486" y="150">added to the Codex chat</text>
    <text class="sub" x="486" y="164">composer; delete to skip</text>
  </g>

  <line class="arrow" x1="662" y1="121" x2="678" y2="121"/>
  <path class="chev" d="M678 116 l7 5 -7 5 z"/>

  <!-- Card 4: sent with prompt -->
  <g>
    <rect class="card" x="695" y="62" width="185" height="118" rx="10"/>
    <circle class="c4" cx="727" cy="94" r="17"/>
    <path class="icon g4" d="M719 99 l16 -10 -6 16 -3 -3 z M729 102 l3 3"/>
    <circle class="b4" cx="851" cy="76" r="8"/>
    <text class="step" x="851" y="79.5">4</text>
    <text class="title" x="711" y="132">Sent with prompt</text>
    <text class="sub" x="711" y="150">rides along with your</text>
    <text class="sub" x="711" y="164">next Codex message</text>
  </g>
</svg>
